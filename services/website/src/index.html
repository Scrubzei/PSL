<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Premier Sniping League</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Premier Sniping League — Competitive 1v1 sniping tournaments, ranked queues, and leaderboards.">
  <meta name="theme-color" content="#7C3AED">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <style>
    /* Loading screen — shown until Angular bootstraps */
    .psl-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 99999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .psl-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .psl-loader img {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }
    .psl-loader-bar {
      width: 120px;
      height: 2px;
      background: rgba(124, 58, 237, 0.2);
      border-radius: 2px;
      margin-top: 24px;
      overflow: hidden;
    }
    .psl-loader-bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #7C3AED, #DC2626);
      border-radius: 2px;
      animation: psl-loading 1.2s ease-in-out infinite;
    }
    @keyframes psl-loading {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(200%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body class="mat-typography">
  <div class="psl-loader" id="psl-loader">
    <img src="assets/psl-moving.gif" alt="Premier Sniping League" />
    <div class="psl-loader-bar"></div>
  </div>
  <app-root></app-root>
</body>
</html>
