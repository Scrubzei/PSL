<div class="dashboard-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Welcome!</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (authService.currentUser(); as user) {
        <p>Username: {{ user.username }}</p>
        <p>Email: {{ user.email }}</p>
      }
      <p>You are successfully logged in!</p>
    </mat-card-content>
  </mat-card>
</div>
