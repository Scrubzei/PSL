<div class="page-wrapper">
  <!-- Dynamic background image on hover -->
  <div
    class="bg-image"
    [class.active]="hoveredGame"
    [style.background-image]="hoveredImage ? 'url(' + hoveredImage + ')' : 'none'">
  </div>

  <!-- Background decorations -->
  <div class="bg-decoration">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="grid-lines"></div>
  </div>

  <div class="leaderboard-container">
    <!-- Hero Section -->
    <div class="hero">
      <div class="hero-badge">
        <span class="badge-dot"></span>
        Live Rankings
      </div>
      <h1>Leaderboards</h1>
      <p class="subtitle">Select a game to view the rankings</p>
    </div>

    <!-- Games Grid -->
    <div class="games-grid">
      @for (game of games; track game.slug) {
        <div
          class="game-card"
          [class.expanded]="selectedGame === game.slug"
          [style.animation-delay]="$index * 0.08 + 's'">

          @if (selectedGame !== game.slug) {
            <!-- Game Cover -->
            <div
              class="card-face card-front"
              (click)="selectGame(game.slug)"
              (mouseenter)="hoveredGame = game.slug; hoveredImage = game.image"
              (mouseleave)="hoveredGame = null; hoveredImage = null">
              <div class="game-image">
                <img [src]="game.image" [alt]="game.name" />
                <div class="image-overlay"></div>
              </div>
              <div class="game-info">
                <h3>{{ game.name }}</h3>
                <span class="arrow">&rarr;</span>
              </div>
            </div>
          } @else {
            <!-- Platform Selection -->
            <div class="card-face card-back">
              <button class="back-btn" (click)="selectGame(null)">
                <span class="back-arrow">&larr;</span>
                {{ game.name }}
              </button>
              <div class="platform-list">
                @for (platform of game.platforms; track platform.slug) {
                  <button
                    class="platform-btn"
                    [style.--btn-color]="platform.color"
                    [style.--btn-hover]="platform.hoverColor"
                    (click)="selectPlatform(game, platform)">
                    <i [class]="platform.icon" class="platform-icon"></i>
                    <span class="platform-name">{{ platform.name }}</span>
                  </button>
                }
              </div>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
