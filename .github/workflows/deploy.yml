name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build website
        run: |
          cd services/website
          npm ci
          npm run build

      - name: Build server
        run: |
          cd services/server
          npm ci
          npm run build

      - name: Build botzei
        run: |
          cd services/botzei
          npm ci
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Write inventory
        run: |
          cat > /tmp/inventory.ini << EOF
          [production]
          ${{ secrets.SERVER_HOST }} ansible_user=${{ secrets.SERVER_USER }} ansible_ssh_private_key_file=~/.ssh/deploy_key
          EOF

      - name: Write env files
        run: |
          printf '%s\n' "${{ secrets.ENV_PRODUCTION }}" > deploy/.env.production
          printf '%s\n' "${{ secrets.ENV_PRODUCTION_BOTZEI }}" > deploy/.env.production.botzei

      - name: Run Ansible playbook
        run: |
          ansible-playbook deploy/playbook.yml \
            -i /tmp/inventory.ini \
            --ssh-extra-args="-o StrictHostKeyChecking=no"
