<div class="page">
  <!-- Background -->
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="scanline"></div>
  </div>

  <!-- Particles -->
  <div class="particles">
    <div class="ember" *ngFor="let p of [1,2,3,4,5,6,7,8]" [style.--i]="p"></div>
  </div>

  <div class="content">
    <div class="games">
      @for (game of games; track game.slug) {
        <div class="game-card" [class.expanded]="selectedGame === game.slug" [style.animation-delay]="$index * 0.08 + 's'">
          @if (selectedGame !== game.slug) {
            <div class="card-front" (click)="selectGame(game.slug)">
              <div class="card-image">
                <img [src]="game.image" [alt]="game.name" />
                <div class="overlay"></div>
                <div class="shine"></div>
              </div>
              <div class="card-label">
                <div class="label-text">
                  <span class="game-name">{{ game.name }}</span>
                  <span class="platform-count">{{ game.platforms.length }} platform{{ game.platforms.length > 1 ? 's' : '' }}</span>
                </div>
                <div class="arrow-circle">
                  <i class="fa-solid fa-chevron-right"></i>
                </div>
              </div>
            </div>
          } @else {
            <div class="card-back">
              <button class="back-btn" (click)="selectGame(null)">
                <i class="fa-solid fa-chevron-left"></i>
                {{ game.name }}
              </button>
              <div class="platforms">
                @for (platform of game.platforms; track platform.slug) {
                  <button
                    class="platform-btn"
                    [style.--c]="platform.color"
                    [style.--ch]="platform.hoverColor"
                    (click)="selectPlatform(game, platform)">
                    <i [class]="platform.icon"></i>
                    <span>{{ platform.name }}</span>
                  </button>
                }
              </div>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
