<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relvic Anti-Cheat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    .logo {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #888;
      margin-bottom: 40px;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 500px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .section {
      margin-bottom: 25px;
    }

    .section-title {
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .path-display {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 13px;
      color: #aaa;
      word-break: break-all;
      min-height: 45px;
      display: flex;
      align-items: center;
    }

    .path-display.set {
      color: #4ade80;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(90deg, #e94560, #c73659);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #eee;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #666;
    }

    .status-dot.running {
      background: #4ade80;
      box-shadow: 0 0 10px #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      flex: 1;
    }

    .status-pid {
      font-size: 12px;
      color: #888;
    }

    .log {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 8px;
      padding: 15px;
      height: 150px;
      overflow-y: auto;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      color: #aaa;
    }

    .log-entry {
      margin-bottom: 5px;
    }

    .log-entry.error {
      color: #f87171;
    }

    .log-entry.success {
      color: #4ade80;
    }

    .log-entry.info {
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <div class="logo">RELVIC</div>
  <div class="subtitle">Anti-Cheat System</div>

  <div class="container">
    <div class="section">
      <div class="section-title">Plutonium Executable</div>
      <div class="path-display" id="pathDisplay">No executable selected</div>
      <div class="btn-group">
        <button class="btn btn-secondary" id="selectBtn">Browse</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Status</div>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-text" id="statusText">Not Running</div>
        <div class="status-pid" id="statusPid"></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="launchBtn" disabled>Launch</button>
        <button class="btn btn-danger" id="stopBtn" disabled>Stop</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Log</div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    let plutoniumPath = null;

    const pathDisplay = document.getElementById('pathDisplay');
    const selectBtn = document.getElementById('selectBtn');
    const launchBtn = document.getElementById('launchBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const statusPid = document.getElementById('statusPid');
    const logEl = document.getElementById('log');

    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      const time = new Date().toLocaleTimeString();
      entry.textContent = `[${time}] ${message}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function updateUI(running, pid = null) {
      if (running) {
        statusDot.classList.add('running');
        statusText.textContent = 'Running';
        statusPid.textContent = pid ? `PID: ${pid}` : '';
        launchBtn.disabled = true;
        stopBtn.disabled = false;
      } else {
        statusDot.classList.remove('running');
        statusText.textContent = 'Not Running';
        statusPid.textContent = '';
        launchBtn.disabled = !plutoniumPath;
        stopBtn.disabled = true;
      }
    }

    selectBtn.addEventListener('click', async () => {
      const path = await ipcRenderer.invoke('select-plutonium');
      if (path) {
        plutoniumPath = path;
        pathDisplay.textContent = path;
        pathDisplay.classList.add('set');
        launchBtn.disabled = false;
        log(`Selected: ${path}`, 'success');
      }
    });

    launchBtn.addEventListener('click', async () => {
      if (!plutoniumPath) return;

      log('Launching Plutonium...', 'info');
      const result = await ipcRenderer.invoke('launch-plutonium', plutoniumPath);

      if (result.success) {
        log(`Plutonium started with PID: ${result.pid}`, 'success');
        updateUI(true, result.pid);
      } else {
        log(`Failed to launch: ${result.error}`, 'error');
      }
    });

    stopBtn.addEventListener('click', async () => {
      log('Stopping Plutonium...', 'info');
      const result = await ipcRenderer.invoke('stop-plutonium');

      if (result.success) {
        log('Plutonium stopped', 'success');
        updateUI(false);
      } else {
        log(`Failed to stop: ${result.error}`, 'error');
      }
    });

    ipcRenderer.on('plutonium-exited', (_event, code) => {
      log(`Plutonium exited with code: ${code}`, 'info');
      updateUI(false);
    });

    ipcRenderer.on('plutonium-error', (_event, error) => {
      log(`Error: ${error}`, 'error');
      updateUI(false);
    });

    log('Relvic Anti-Cheat initialized', 'success');
  </script>
</body>
</html>
