services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./services/server
      dockerfile: Dockerfile
    container_name: server
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: appdb
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRATION: 24h
      FRONTEND_URL: http://localhost:4200
      BOT_API_KEY: ${BOT_API_KEY}
      BOTZEI_URL: http://botzei:3001
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_CALLBACK_URL: ${DISCORD_CALLBACK_URL}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./services/server:/app
      - /app/node_modules

  website:
    build:
      context: ./services/website
      dockerfile: Dockerfile.dev
    container_name: website
    ports:
      - "4200:4200"
    depends_on:
      - server
    networks:
      - app-network
    volumes:
      - ./services/website:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  botzei:
    build:
      context: ./services/botzei
      dockerfile: Dockerfile.dev
    container_name: botzei
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: 1469896838856441979
      DISCORD_GUILD_ID: 1459142539142627562
      BACKEND_URL: http://server:3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      LOGIN_URL: http://localhost:3000/auth/discord
      BOT_API_KEY: ${BOT_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - server
    networks:
      - app-network
    volumes:
      - ./services/botzei:/app
      - /app/node_modules
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
