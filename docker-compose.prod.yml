services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME:-appdb}
    # Bound to loopback only — reachable via an SSH tunnel, never from the public internet.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: ./services/server
      dockerfile: Dockerfile
    container_name: server
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME:-appdb}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 24h
      FRONTEND_URL: ${FRONTEND_URL}
      BOT_API_KEY: ${BOT_API_KEY}
      BOTZEI_URL: http://botzei:3001
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_CALLBACK_URL: ${DISCORD_CALLBACK_URL}
      NEATQUEUE_API_TOKEN: ${NEATQUEUE_API_TOKEN}
      NEATQUEUE_SERVER_ID: ${NEATQUEUE_SERVER_ID}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      app-network:
        aliases:
          - backend
    restart: unless-stopped

  website:
    build:
      context: ./services/website
      dockerfile: Dockerfile
    container_name: website
    depends_on:
      - server
    networks:
      - app-network
    restart: unless-stopped

  botzei:
    build:
      context: ./services/botzei
      dockerfile: Dockerfile
    container_name: botzei
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      BACKEND_URL: http://server:3000
      FRONTEND_URL: ${FRONTEND_URL}
      LOGIN_URL: ${FRONTEND_URL}/auth/discord
      BOT_API_KEY: ${BOT_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      API_PORT: 3001
    depends_on:
      - server
    networks:
      - app-network
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - website
      - server
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
