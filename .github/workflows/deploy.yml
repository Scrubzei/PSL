name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build website
        run: |
          cd services/website
          npm ci
          npm run build

      - name: Build server
        run: |
          cd services/server
          npm ci
          npm run build

      - name: Build botzei
        run: |
          cd services/botzei
          npm ci
          npm run build

      - name: Package build artifacts
        run: |
          tar -czf ${{ runner.temp }}/deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='*.log' \
            .
          cp ${{ runner.temp }}/deploy.tar.gz ./deploy.tar.gz

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy.tar.gz
          target: /tmp

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            mkdir -p /var/www/slb
            tar -xzf /tmp/deploy.tar.gz -C /var/www/slb
            rm /tmp/deploy.tar.gz

            cat > /var/www/slb/services/server/.env << 'ENVEOF'
            ${{ secrets.ENV_PRODUCTION }}
            ENVEOF

            cat > /var/www/slb/services/botzei/.env << 'ENVEOF'
            ${{ secrets.ENV_PRODUCTION_BOTZEI }}
            ENVEOF

            cd /var/www/slb/services/server
            npm install --production
            npm run migration:run
            pm2 describe slb-backend > /dev/null 2>&1 && pm2 restart slb-backend || pm2 start dist/main.js --name slb-backend

            cd /var/www/slb/services/botzei
            npm install --production
            node dist/deploy-commands.js
            pm2 describe slb-botzei > /dev/null 2>&1 && pm2 restart slb-botzei || pm2 start dist/index.js --name slb-botzei

            pm2 save
